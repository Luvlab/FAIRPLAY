<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / Web App -->
    <meta name="application-name" content="FAIRPLAY" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Apple / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FAIRPLAY" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg" />
    <link rel="shortcut icon" type="image/svg+xml" href="/pwa-icon.svg" />

    <!-- ── SEO ──────────────────────────────────────────────────────── -->
    <title>FAIRPLAY — The Referee Engine for the Beautiful Game</title>
    <meta name="description" content="FAIRPLAY is the referee app for everyone. Call every foul, card and restart live on any match. Compare your decisions with fans worldwide. Follow every league in 20 languages — free forever." />
    <meta name="keywords" content="soccer referee app, football referee, live match calls, referee engine, football app, soccer app, compare referee calls, football leagues, FIFA World Cup, Premier League referee" />
    <meta name="author" content="FAIRPLAY — luvlab.io" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fairplay-pearl.vercel.app/" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn, iMessage) ─────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="FAIRPLAY" />
    <meta property="og:url"         content="https://fairplay-pearl.vercel.app/" />
    <meta property="og:title"       content="FAIRPLAY — The Referee Engine for the Beautiful Game" />
    <meta property="og:description" content="Call every foul, card &amp; restart live. Compare with fans worldwide. Every league on the planet — free, in 20 languages." />
    <meta property="og:image"       content="https://fairplay-pearl.vercel.app/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="FAIRPLAY app — soccer ball with live referee features listed" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter / X Card ────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@fairplay_app" />
    <meta name="twitter:title"       content="FAIRPLAY — The Referee Engine for the Beautiful Game" />
    <meta name="twitter:description" content="Call every foul, card &amp; restart live. Compare with fans worldwide. Every league on the planet — free, in 20 languages." />
    <meta name="twitter:image"       content="https://fairplay-pearl.vercel.app/og-image.png" />
    <meta name="twitter:image:alt"   content="FAIRPLAY — referee engine for the beautiful game" />

    <style>
      * { touch-action: pan-x pan-y; }
      /* Prevent FOUC — match app background */
      body { background: #0d1117; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
